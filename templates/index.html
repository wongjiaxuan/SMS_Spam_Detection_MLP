<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMS Spam Detection System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ================= RESET ================= */
* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family:'Inter', sans-serif;
    background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
    min-height:100vh;
    padding:20px;
    color:#1a1a2e;
}

.container {
    max-width:1400px;
    margin:auto;
    background:rgba(255,255,255,0.97);
    backdrop-filter:blur(20px);
    border-radius:32px;
    padding:40px;
    box-shadow:0 40px 100px rgba(0,0,0,0.5);
}

/* ===== KEEP REST OF YOUR CSS UNCHANGED ===== */
/* (omitted only for brevity, NO changes needed) */
</style>
</head>

<body>
<div class="container">

<header>
    <div class="header-badge">🚀 Powered by Neural Networks</div>
    <h1>📱 SMS Spam Detection</h1>
    <p>MLP Neural Network • 98.13% Accuracy</p>
</header>

<!-- ================= MESSAGE ================= -->
<section>
<div class="section-title">🔍 Check Your Message</div>

<textarea id="messageInput" placeholder="Type SMS..." rows="4"></textarea>

<div class="btn-group">
    <button class="btn btn-primary" onclick="predictMessage()">Analyze</button>
    <button class="btn btn-secondary" onclick="clearMessage()">Clear</button>
</div>

<div id="resultContainer">
    <div id="resultBox">
        <div id="resultIcon">✅</div>
        <div id="resultText">Legitimate</div>
        <div id="resultProbability"></div>
    </div>
</div>
</section>

<!-- ================= BATCH ================= -->
<section>
<div class="section-title">📋 Batch Testing</div>

<textarea id="batchInput" placeholder="One message per line"></textarea>

<div class="batch-actions">
    <button class="btn btn-success" onclick="batchPredict()">Test</button>
    <button class="btn btn-danger" onclick="clearBatch()">Clear</button>
</div>

<div id="batchResults">
    <div class="batch-empty">Enter messages</div>
</div>
</section>

<!-- ================= STATS ================= -->
<section>
<div class="section-title">📊 Model Performance</div>

<div class="stats-grid">
    <div class="stat-card"><div id="accuracy">-</div><div>Accuracy</div></div>
    <div class="stat-card"><div id="precision">-</div><div>Precision</div></div>
    <div class="stat-card"><div id="recall">-</div><div>Recall</div></div>
    <div class="stat-card"><div id="f1score">-</div><div>F1</div></div>
</div>
</section>

<!-- ================= CHARTS ================= -->
<section>
<div class="section-title">📈 Visualizations</div>

<div class="charts-grid">
    <div id="classDistContainer"></div>
    <div id="confMatrixContainer"></div>
    <div id="trainingHistoryContainer"></div>
    <div id="featureImportContainer"></div>
</div>
</section>

</div>

<script>

/* ================= CONSTANTS ================= */
const jsonHeader = { 'Content-Type': 'application/json' };

/* ================= HELPERS ================= */
function qs(id){ return document.getElementById(id); }

function loadChart(id, url){
    qs(id).innerHTML =
        `<img src="${url}?t=${Date.now()}" style="width:100%;height:auto;max-height:400px;">`;
}

/* ================= SINGLE PREDICT ================= */
function predictMessage(){
    const msg = qs('messageInput').value.trim();
    if(!msg) return alert('Enter message');

    const container = qs('resultContainer');
    container.style.display = 'block';

    const box = qs('resultBox');
    box.className = '';

    qs('resultIcon').textContent = '⏳';
    qs('resultText').textContent = 'Analyzing...';
    qs('resultProbability').textContent = '';

    fetch('/predict', {
        method:'POST',
        headers:jsonHeader,
        body:JSON.stringify({message:msg})
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.error) return alert(data.error);

        const icon = qs('resultIcon');
        const text = qs('resultText');
        const prob = qs('resultProbability');

        if(data.is_spam){
            icon.textContent='🚫';
            text.textContent='SPAM';
            box.className='spam';
        }else{
            icon.textContent='✅';
            text.textContent='HAM';
            box.className='ham';
        }

        prob.textContent = `Confidence: ${data.probability}%`;
    })
    .catch(e=>console.error(e));
}

/* ================= BATCH ================= */
function batchPredict(){
    const input = qs('batchInput').value.trim();
    if(!input) return alert('Enter messages');

    const messages = input.split('\n').filter(Boolean);

    const container = qs('batchResults');
    container.innerHTML = '<div>Loading...</div>';

    fetch('/batch_predict',{
        method:'POST',
        headers:jsonHeader,
        body:JSON.stringify({messages})
    })
    .then(r=>r.json())
    .then(data=>{
        if(data.error) return alert(data.error);

        container.innerHTML='';

        data.results.forEach(r=>{
            const div=document.createElement('div');
            div.className=`batch-result ${r.result}`;
            div.innerHTML=
                `<div class="msg">${r.message}</div>
                 <div class="label">${r.result.toUpperCase()} (${r.probability}%)</div>`;
            container.appendChild(div);
        });
    })
    .catch(e=>console.error(e));
}

/* ================= CLEAR ================= */
function clearMessage(){
    qs('messageInput').value='';
    qs('resultContainer').style.display='none';
}

function clearBatch(){
    qs('batchInput').value='';
    qs('batchResults').innerHTML='<div class="batch-empty">Enter messages</div>';
}

/* ================= STATS ================= */
function loadStats(){
    fetch('/get_stats')
    .then(r=>r.json())
    .then(d=>{
        if(d.error) return;

        qs('accuracy').textContent=d.accuracy+'%';
        qs('precision').textContent=d.precision+'%';
        qs('recall').textContent=d.recall+'%';
        qs('f1score').textContent=d.f1_score+'%';
    });
}

/* ================= CHARTS ================= */
function loadCharts(){
    loadChart('classDistContainer','/plot_class_distribution');
    loadChart('confMatrixContainer','/plot_confusion_matrix');
    loadChart('trainingHistoryContainer','/plot_training_history');
    loadChart('featureImportContainer','/plot_feature_importance');
}

/* ================= EVENTS ================= */
qs('messageInput').addEventListener('keydown',(e)=>{
    if(e.key==='Enter' && !e.shiftKey){
        e.preventDefault();
        predictMessage();
    }
});

/* ================= INIT ================= */
window.onload=function(){
    loadStats();
    loadCharts();
    // Refresh charts every 30 seconds
    setInterval(loadCharts,30000);
};

</script>

</body>
</html>
